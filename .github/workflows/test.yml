name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-inmemory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release --logger "trx;LogFileName=results.trx"
        env:
          BIGQUERY_TEST_TARGET: inmemory
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-inmemory
          path: '**/*.trx'

  test-emulator:
    runs-on: ubuntu-latest
    services:
      bigquery-emulator:
        image: ghcr.io/goccy/bigquery-emulator:0.6.6
        env:
          BIGQUERY_EMULATOR_PROJECT: test-project
        ports:
          - 9050:9050
          - 9060:9060
        options: >-
          --health-cmd "curl -sf http://localhost:9050/bigquery/v2/projects/test-project/datasets || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release --filter "Target!=InMemoryOnly&Target!=CloudOnly" --logger "trx;LogFileName=results.trx"
        env:
          BIGQUERY_TEST_TARGET: emulator
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-emulator
          path: '**/*.trx'

  test-cloud-on-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
      - run: dotnet test --configuration Release --filter "Target!=InMemoryOnly&Target!=EmulatorOnly" --logger "trx;LogFileName=results.trx"
        env:
          BIGQUERY_TEST_TARGET: cloud
          BIGQUERY_PROJECT_ID: ${{ secrets.BIGQUERY_PROJECT_ID }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-cloud
          path: '**/*.trx'
